<h2>后端数据如何获取？</h2>
<p class="subtitle">这决定了数据是模拟的还是真实对接的，影响整个项目的架构</p>

<div class="options">
  <div class="option" data-choice="mock" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>纯前端 Mock 数据</h3>
      <p>所有数据用本地 JSON 模拟，页面完整可交互，适合<strong>演示/原型验证/毕业设计</strong>。无需后端，开发最快。</p>
    </div>
  </div>
  <div class="option" data-choice="real-api" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>对接真实后端 API</h3>
      <p>小程序通过 HTTP 请求对接已有的后端服务。适合<strong>已有后端系统</strong>或<strong>需要真实数据</strong>的场景。</p>
    </div>
  </div>
  <div class="option" data-choice="hybrid" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>Mock + API 双模式</h3>
      <p>先用 Mock 数据开发完整功能，<strong>预留 API 对接接口</strong>。后期后端就绪后快速切换。适合<strong>前后端并行开发</strong>。</p>
    </div>
  </div>
</div>
