<h2>uni-app 使用哪个 UI 组件库？</h2>
<p class="subtitle">组件库决定了开发效率和最终呈现效果，选对能省大量时间</p>

<div class="options">
  <div class="option" data-choice="uview" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>uView Plus 3.x（推荐）</h3>
      <p>uni-app 生态最成熟的组件库，覆盖表单、列表、弹窗、日历、上传等<strong>80+组件</strong>，主题色可配置，社区活跃。适合<strong>功能型小程序</strong>，请假、预约、排班等表单场景都有现成组件。</p>
    </div>
  </div>
  <div class="option" data-choice="uni-ui" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>uni-ui 官方组件库</h3>
      <p>DCloud 官方出品，兼容性最好，组件质量稳定但<strong>数量较少</strong>，风格偏基础。适合对定制化要求不高、追求稳定的场景。</p>
    </div>
  </div>
  <div class="option" data-choice="custom" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>自定义 SCSS 样式</h3>
      <p>不依赖组件库，全程手写样式和组件。灵活度最高，但<strong>开发量最大</strong>，适合有独特视觉要求或想完全掌控细节的场景。</p>
    </div>
  </div>
</div>
