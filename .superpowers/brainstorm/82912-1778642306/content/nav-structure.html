<h2>底部导航栏应该如何设计？</h2>
<p class="subtitle">你提到的 5 个一级页面是：登录、主页、消息、功能、我的。但通常登录页不需要常驻在标签栏中</p>

<div class="split">
  <div class="mockup">
    <div class="mockup-header">A. 4 Tab（推荐）<br><small>登录作为独立入口页，登录后不再显示</small></div>
    <div class="mockup-body">
      <div style="text-align:center;padding:8px;background:#4A90D9;color:#fff;font-size:13px;border-radius:4px;margin-bottom:12px;">
        登录页 → 微信授权 → 选择身份
      </div>
      <div style="border:1px solid #ddd;border-radius:6px;overflow:hidden;">
        <div style="padding:16px;text-align:center;font-size:14px;color:#333;">📋 页面内容区域</div>
        <div style="display:flex;background:#f8f8f8;border-top:1px solid #e0e0e0;font-size:10px;text-align:center;">
          <div style="flex:1;padding:8px 4px;color:#4A90D9;">🏠<br>主页</div>
          <div style="flex:1;padding:8px 4px;color:#999;">💬<br>消息</div>
          <div style="flex:1;padding:8px 4px;color:#999;">⚡<br>功能</div>
          <div style="flex:1;padding:8px 4px;color:#999;">👤<br>我的</div>
        </div>
      </div>
      <p style="font-size:11px;color:#666;margin-top:8px;">登录成功后进入主页，4个Tab各司其职</p>
    </div>
  </div>

  <div class="mockup">
    <div class="mockup-header">B. 5 Tab（原方案）<br><small>登录作为常驻页面放在标签栏</small></div>
    <div class="mockup-body">
      <div style="border:1px solid #ddd;border-radius:6px;overflow:hidden;">
        <div style="padding:16px;text-align:center;font-size:14px;color:#333;">📋 页面内容区域</div>
        <div style="display:flex;background:#f8f8f8;border-top:1px solid #e0e0e0;font-size:10px;text-align:center;">
          <div style="flex:1;padding:8px 4px;color:#999;">🔑<br>登录</div>
          <div style="flex:1;padding:8px 4px;color:#999;">🏠<br>主页</div>
          <div style="flex:1;padding:8px 4px;color:#999;">💬<br>消息</div>
          <div style="flex:1;padding:8px 4px;color:#999;">⚡<br>功能</div>
          <div style="flex:1;padding:8px 4px;color:#999;">👤<br>我的</div>
        </div>
      </div>
      <div class="pros-cons" style="font-size:11px;margin-top:12px;">
        <div class="cons"><h4>问题</h4><ul>
          <li>登录后 Tab 占用浪费</li>
          <li>切换回登录页没有意义</li>
          <li>微信 Tab 上限 5 个</li>
        </ul></div>
      </div>
    </div>
  </div>
</div>
